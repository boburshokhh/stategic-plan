services:
  - type: web
    name: strategic-plan-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /docs
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: FRONTEND_URL
        sync: false
      - key: LDAP_SERVER
        sync: false
      - key: LDAP_BASE_DN
        sync: false
      - key: LDAP_USER_DN
        sync: false
      - key: LDAP_USER_DEPARTMENTS
        sync: false
